[user]
name = "aragao"
fullName = "Andre Aragao"

[machines.workstation]
hostName = "workstation"
platform = "x86_64-linux"
profile = "workstation"
stateVersion = "25.05"
wirelessInterface = "wlp12s0"
bluetooth = true
lockScreen = true
autoLogin = false
useDms = true

[machines.hp-laptop]
hostName = "hp-laptop"
platform = "x86_64-linux" 
profile = "laptop"
stateVersion = "25.05"
wirelessInterface = "wlp2s0"
bluetooth = true
lockScreen = true
autoLogin = false
useDms = false

[machines.prl-dev-vm]
hostName = "prl-dev-vm"
platform = "aarch64-linux"
profile = "vm"
stateVersion = "25.05"
bluetooth = false
lockScreen = false
autoLogin = false
useDms = true
# Install Plasma 6 alongside niri and use tuigreet to pick the
# session at login — needed to troubleshoot why KWin sees both
# displays inside this Parallels VM while niri sees one.
multiSession = true

# Same shape as prl-dev-vm, but runs under VMware Fusion on Apple
# Silicon (mac-work). The hypervisor split lives entirely in
# hardware/<host>/hardware-configuration.nix — vmw_pvscsi/vmxnet3 and
# virtualisation.vmware.guest replace the Parallels guest agent.
[machines.vmw-dev-vm]
hostName = "vmw-dev-vm"
platform = "aarch64-linux"
profile = "vm"
stateVersion = "25.05"
bluetooth = false
lockScreen = false
autoLogin = true
useDms = true

[machines.tala]
hostName = "tala"
platform = "x86_64-linux"
profile = "server"
stateVersion = "25.05"
wirelessInterface = "wlp0s12f0"
bluetooth = false
lockScreen = false
autoLogin = false
useDms = false

# Work-issued MacBook (Apple Silicon). Built with nix-darwin instead of
# NixOS — see darwinConfigurations in flake.nix. "profile = darwin" is
# a sentinel: system/ modules are not imported, so the legacy
# isWorkstation/isLaptop/isVm/isServer booleans all stay false.
[machines.mac-work]
hostName = "mac-work"
platform = "aarch64-darwin"
profile = "darwin"
stateVersion = "25.11"
bluetooth = false
lockScreen = false
autoLogin = false
useDms = false
# Declarative Homebrew casks. nix-darwin runs `brew install/upgrade` to
# match this list on every activation. Homebrew itself must be installed
# manually once (see https://brew.sh) — nix-darwin does not bootstrap it.
#
# NOTE on Parallels Desktop: deliberately NOT in this list. Its cask
# runs a post-install `inittool` that needs to chown files inside
# /Applications/Parallels Desktop.app/, which macOS's App Management
# TCC layer blocks even under `sudo` unless the calling shell has been
# granted "App Management" permission. Install Parallels via the
# official .pkg installer from parallels.com instead — leaving it
# unmanaged here so brew bundle's `cleanup = "zap"` does not touch it.
homebrewCasks = [
    # Already in service: terminal, launcher, WM, browsers, focused-window outliner.
    "ghostty",
    "raycast",
    "aerospace",
    "brave-browser",
    "chromium",
    # Editors mirroring the Linux home/desktop/{vscode,zed}.nix set.
    "visual-studio-code",
    "cursor",
    "zed",
    # Notes / secrets / chat — matches Linux home.packages.
    "obsidian",
    "bitwarden",
    "telegram",
    # NOTE on zoom: deliberately NOT in this list. Its cask runs a
    # `.pkg` installer via `sudo /usr/sbin/installer`, and brew bundle
    # under nix-darwin activation has no attached tty for the sudo
    # password prompt — activation fails the same way Parallels does.
    # Install Zoom by hand from https://zoom.us/download (auto-updates
    # itself thereafter). Same workaround as Parallels Desktop above.
    # Extra browsers used on Linux; Brave + Chromium already covered above.
    "firefox",
    "google-chrome",
    # Containers / Linux VMs. Replaces the podman-compose role from the Linux side
    # without the weight of Docker Desktop.
    "orbstack",
    # macOS-only quality-of-life — fill roles the Linux waybar/desktop config covers natively.
    "stats",     # menu-bar CPU/RAM/network/temperature widget; waybar analog
    "maccy",     # clipboard history manager (no equivalent in either OS config currently)
    "hiddenbar", # collapse-arrow for the menu bar; tames growing menu-bar icon collection
]
homebrewBrews = [
    "borders",                   # JankyBorders — focused-window outline daemon (FelixKratz/formulae tap)
    "sadiksaifi/tap/mac-menu",   # Native Swift stdin/stdout fuzzy picker; choose-gui replacement with correct Esc behavior
]
